<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Homework</title>
</head>
<body>
    <div class="container" style="border: 1px solid #999; border-radius: 10px; margin-top: 40px; padding: 20px; max-width: 800px;" dir="ltr">
        
        <div class="row text-center">
            <div class="col">
                <label>Number 1</label>
                <input type="number" class="form-control" id="num1">
            </div>
            <div class="col">
                <label>Number 2</label>
                <input type="number" class="form-control" id="num2">
            </div>
            <div class="col">
                <label>Number 3</label>
                <input type="number" class="form-control" id="num3">
            </div>
        </div>

        <hr style="margin-top: 30px; margin-bottom: 30px;">

        <div style="margin-bottom: 15px;">
            <button type="button" class="btn btn-outline-dark" onclick="add()" style="width: 100px;">ADD</button> = الجمع
            <span id="res1" style="margin-left: 10px; font-weight: bold; color: green;"></span>
        </div>

        <div style="margin-bottom: 15px;">
            <button type="button" class="btn btn-outline-dark" onclick="multi()" style="width: 100px;">Multi</button> = الضرب
            <span id="res2" style="margin-left: 10px; font-weight: bold; color: green;"></span>
        </div>

        <div style="margin-bottom: 15px;">
            <button type="button" class="btn btn-outline-dark" onclick="max()" style="width: 100px;">MAX</button> = 
            <input type="text" id="res3" style="width: 80px; display: inline-block;" class="form-control" readonly>
        </div>

        <div style="margin-bottom: 15px;">
            <button type="button" class="btn btn-outline-dark" onclick="averge()" style="width: 100px;">Averge</button> = 
            <input type="text" id="res4" style="width: 80px; display: inline-block;" class="form-control" readonly>
        </div>

    </div>

    <script>
        function add() {
            var n1 = document.getElementById("num1").value;
            var n2 = document.getElementById("num2").value;
            var n3 = document.getElementById("num3").value;
            
            var result = Number(n1) + Number(n2) + Number(n3);
            document.getElementById("res1").innerHTML = result;
        }

        function multi() {
            var n1 = document.getElementById("num1").value;
            var n2 = document.getElementById("num2").value;
            var n3 = document.getElementById("num3").value;
            
            var result = n1 * n2 * n3;
            document.getElementById("res2").innerHTML = result;
        }

        function max() {
            var n1 = document.getElementById("num1").value;
            var n2 = document.getElementById("num2").value;
            var n3 = document.getElementById("num3").value;
            
            var maxNumber = Math.max(n1, n2, n3);
            document.getElementById("res3").value = maxNumber;
        }

        function averge() {
            var n1 = Number(document.getElementById("num1").value);
            var n2 = Number(document.getElementById("num2").value);
            var n3 = Number(document.getElementById("num3").value);
            
            var sum = n1 + n2 + n3;
            var avg = sum / 3;

            document.getElementById("res4").value = avg;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
